name: ci

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        build_type: [Debug, Release]
    steps:
      - uses: actions/checkout@v6
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
      - name: Build
        run: cmake --build build -j
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Generator Smoke Test
        run: |
          python3 experiments/generate_medium_graphs.py \
            --output /tmp/rsp-ci-graphs \
            --sizes 20 \
            --cases 2 \
            --actions 3 \
            --successors-values 1 2 5 \
            --seed 42
          test -f /tmp/rsp-ci-graphs/graph_metadata.csv
      - name: Runtime Smoke Test
        run: |
          ./build/run_runtime \
            --input-dir /tmp/rsp-ci-graphs \
            --output /tmp/rsp-ci-runtime \
            --epsilon 1e-9 \
            --max-iter 100000
          test -f /tmp/rsp-ci-runtime/runtime_summary.csv
      - name: Robustness Smoke Test
        run: |
          ./build/run_robustness \
            --input data/toy_graph.txt \
            --output /tmp/rsp-ci-robustness \
            --start 0 \
            --max-steps 20
          test -f /tmp/rsp-ci-robustness/robustness.csv
      - name: Visualization Smoke Test
        run: |
          ./build/rsp_main --input data/toy_graph.txt --algorithm vi --output /tmp/rsp-ci-viz
          ./build/rsp_main --input data/toy_graph.txt --algorithm pi --output /tmp/rsp-ci-viz
          ./build/rsp_main --input data/toy_graph.txt --algorithm dijkstra --output /tmp/rsp-ci-viz
          ./build/rsp_main --input data/toy_graph.txt --algorithm exhaustive --output /tmp/rsp-ci-viz
          ./build/rsp_main --input data/toy_graph.txt --algorithm baseline_nominal --output /tmp/rsp-ci-viz
          grep -q '^toy_graph,vi,0,7.000000$' /tmp/rsp-ci-viz/values.csv
          grep -q '^toy_graph,baseline_nominal,0,102.000000$' /tmp/rsp-ci-viz/values.csv
          ./build/run_robustness --input data/toy_graph.txt --output /tmp/rsp-ci-viz --start 0 --max-steps 20
          grep -q '^toy_graph,2,vi,0,1,ok,7.000000,1,2$' /tmp/rsp-ci-viz/robustness.csv
          python3 visualization/plot_graph.py \
            --graph-json data/toy_graph.json \
            --output /tmp/rsp-ci-viz/toy_graph.svg
          test -f /tmp/rsp-ci-viz/toy_graph.svg
          python3 visualization/plot_values.py \
            --values-csv /tmp/rsp-ci-viz/values.csv \
            --graph-id toy_graph \
            --algorithms vi,pi,dijkstra,exhaustive \
            --output /tmp/rsp-ci-viz/toy_values.svg
          test -f /tmp/rsp-ci-viz/toy_values.svg
          python3 visualization/plot_comparison.py \
            --runtime-summary-csv /tmp/rsp-ci-runtime/runtime_summary.csv \
            --robustness-summary-csv /tmp/rsp-ci-robustness/robustness_summary.csv \
            --requested-s 5 \
            --actions 3 \
            --output /tmp/rsp-ci-viz/comparison.svg
          test -f /tmp/rsp-ci-viz/comparison.svg

  sanitizer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DRSP_ENABLE_SANITIZERS=ON
      - name: Build
        run: cmake --build build -j
      - name: Test
        run: ctest --test-dir build --output-on-failure

  strict-warnings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Configure (warnings as errors)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DRSP_WERROR=ON
      - name: Build
        run: cmake --build build -j
      - name: Test
        run: ctest --test-dir build --output-on-failure
